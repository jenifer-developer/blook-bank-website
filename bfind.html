<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="bfind.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg custom-nav">
    <div class="container">

        <a class="navbar-brand fw-bold text-white" href="#">Find Donor</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item active">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="donate.html">Donate</a>
                </li>

                <li class="nav-item ">
                    <a class="nav-link" href="index.html#about">about</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="index.html#contact-section">Contact</a>
                </li>

                <!-- Buttons -->
                <li class="nav-item ms-2">
                   <a href="login-b.html" class="login-btn">Login</a>
                </li>

                <li class="nav-item ms-2">
                    <a href="sign-b.html" class="signup-btn">Sign up</a>
                </li>

                <li class="nav-item ms-2">
                     <a href="request.html" class=" request-btn">Create Request</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- HERO -->
<section class="hero text-center text-white">
    <div class="container">
        <h1>Find Blood Donors</h1>
        <p>Connect with donors near you quickly</p>
    </div>
</section>

<!-- SEARCH -->
<section class="search-box">
    <div class="container">
        <div class="row g-3">

            <div class="col-md-2">
                <select class="form-control">
                    <option>Blood Group</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                    
                </select>
            </div>

            <div class="col-md-2">
                <input type="text" class="form-control" placeholder="City">
            </div>

            <div class="col-md-2">
                <input type="text" class="form-control" placeholder="Area">
            </div>

            <div class="col-md-2">
                <select class="form-control">
                    <option>State</option>
                    <option>Kerala</option>
                    <option>Tamil Nadu</option>
                </select>
            </div>

            <div class="col-md-2">
                <select class="form-control">
                    <option>Availability</option>
                    <option>Available</option>
                    <option>Busy</option>
                </select>
            </div>

            <div class="col-md-2">
                <button class="btn search-btn w-100">Search</button>
            </div>

        </div>
    </div>
</section>

<!-- RESULT -->
<section class="result text-center">
    <h4>No Blood Donors Found</h4>
</section>

<!-- CTA -->
<section class="cta text-white">
    <div class="container d-flex justify-content-between align-items-center flex-wrap">
        <div>
            <h4>Need Blood Urgently?</h4>
            <p>Create request and connect with donors</p>
        </div>
      <a href="request.html">  <button class="request-btn">Create Request</button></a>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer text-center">
    <p>© 2026 BloodConnect | Made by Jenifer</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
