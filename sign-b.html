<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="sign-b.css">
</head>
<body>
        <div class="form-wrapper">
          <center>  <h1>Sign Up</h1></center><br>
            <p class="subtittle">Enter your details to create an account</p><br>

            <form>
                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" placeholder="your Name" required>
                </div>
                <div class="input-row">
                    <div class="input-box">
                        <label>Blood Group</label>
                        <select required>
                            <option value="" disabled selected>Select</option>
                            <option>A+</option>
                            <option>B+</option>
                             <option>O+</option>
                              <option>A-</option>
                               <option>B-</option>
                                <option>O-</option>
                                 <option>AB+</option>
                                  <option>AB-</option>
                            
                     <select> 
                    </div>
                     <div class="input-box">
                        <label>Gender</label>
                        <select required>
                            <option value="" disabled selected>select</option>
                             <option>Male</option>
                              <option>Female</option>
                               <option>other</option>
                        </select>  
                     </div>
                </div>
                <div class="input-row">
                    <div class="input-box">
                        <label>Contact Number</label>
                        <input type="tel" placeholder="your mobile" required>
                    </div>
                    <div class="input-box">
                        <label>city</label>
                        <input type="text" placeholder="Your City" required>
                    </div>
                </div>
                   <div class="input-box">
                    <label> Email Address</label>
                    <input type="email" placeholder="email@example.com" required>

                </div>
                    <div class="input-box">
                        <label>password</label>
                        <input type="password" placeholder="create password" required>
                    </div>
                    <div class="input-box">
                        <label>Last Donation Date (optional)</label>
                        <input type="date">
                    </div>
                    
<img src="blood donation-amico.png" class="signimg">

                    <button type="submit" class="auth-btn">CREATE ACCOUNT</button>
                
                
               
            </form>
            <P class="login-prompt">Already a member? <a href="login.html">Login</a></P>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
