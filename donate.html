
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Blood</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="donate.css">
</head>

<body>

<!-- HEADER -->
<section class="donate-header">
    <h1>Donate Blood, Save Lives ❤️</h1>
    <p>Your small help can save someone's life</p>
</section>

<!-- FORM -->
<div class="container my-5">
    <div class="form-section shadow">

        <form>
            <div class="row">

                <!-- Donate Type -->
                <h3>Donation Type</h3>
                <div class="col-12 mb-3">
                    <input type="radio" name="type"> Donate Blood
                    <input type="radio" name="type" class="ms-3"> Emergency Donor
                </div>

                <!-- Personal -->
                <h3>Personal Details</h3>
                <div class="col-md-4 mb-3">
                    <input type="text" class="form-control" placeholder="Full Name">
                </div>
                <div class="col-md-4 mb-3">
                    <input type="number" class="form-control" placeholder="Age">
                </div>
                <div class="col-md-4 mb-3">
                    <select class="form-control">
                        <option>Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <!-- Contact -->
                <h3>Contact Details</h3>
                <div class="col-md-6 mb-3">
                    <input type="tel" class="form-control" placeholder="Phone">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="email" class="form-control" placeholder="Email">
                </div>

                <!-- Blood -->
                <h3>Blood Details</h3>
                <div class="col-md-4 mb-3">
                    <select class="form-control">
                        <option>Blood Group</option>
                        
    <option>A+</option>
    <option>A-</option>
    <option>B+</option>
    <option>B-</option>
    <option>O+</option>
    <option>O-</option>
    <option>AB+</option>
    <option>AB-</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="date" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <select class="form-control">
                        <option>First Time Donor?</option>
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <!-- Appointment -->
                <h3>Appointment</h3>
                <div class="col-md-6 mb-3">
                    <input type="date" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="time" class="form-control">
                </div>

                <!-- Health -->
                <h3>Health Check</h3>
                <div class="col-12 mb-3">
                    <input type="checkbox"> I am healthy <br>
                    <input type="checkbox"> No recent illness <br>
                    <input type="checkbox"> Not donated in last 3 months
                </div>

                <!-- Submit -->
                <div class="col-12">
                    <button class="btn btn-donate w-100">Become a Donor ❤️</button>
                </div>

            </div>
        </form>
        <div class="donate-image-section">
            <img src="hand.jpeg" alt="donor image">
        </div>
       

    </div>
</div>

</body>
</html>
